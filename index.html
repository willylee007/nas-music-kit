<!DOCTYPE html>
{# Jinja2 模板：vip_mode 由 Flask 路由注入，True = /vip 入口 #}
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS 音乐助手</title>
    <meta name="description" content="搜索高质量音乐，一键下载入库 NAS">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1d232a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <script>
        (() => {
            const theme = localStorage.getItem("nas-music-kit:theme") || "night";
            document.documentElement.dataset.theme = theme === "day" ? "day" : "night";
        })();
    </script>
    <!-- Vue 3 (single-file, no build step) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">

</head>

<body>
    <div id="app" data-vip="{{ 'true' if vip_mode else 'false' }}" v-cloak>
        <button type="button" class="theme-toggle" :title="themeToggleTitle" :aria-label="themeToggleTitle" @click="toggleTheme">
            <span v-html="iconSvg(theme === 'day' ? 'moon' : 'sun', 18)"></span>
        </button>

        <div class="container">
            <header>
                <h1 @click="reloadPage">NAS 音乐助手</h1>
            </header>

            <div class="modal-overlay" :class="{ show: activeModal === 'shortcuts' }" @click="closeModal">
                <div class="modal-content" @click.stop>
                    <img src="/static/friday-xie.jpg" alt="QR Code" class="qr-img">
                    <p class="modal-text">关注获取快捷指令</p>
                </div>
            </div>

            <div class="modal-overlay" :class="{ show: activeModal === 'donate' }" @click="closeModal">
                <div class="modal-content" style="max-width: 500px;" @click.stop>
                    <div class="qr-grid">
                        <div>
                            <img src="/static/wechat.webp" alt="Wechat" class="qr-img" style="width: 100%;">
                            <p class="modal-text">微信</p>
                        </div>
                        <div>
                            <img src="/static/alipay.webp" alt="Alipay" class="qr-img" style="width: 100%;">
                            <p class="modal-text">支付宝</p>
                        </div>
                    </div>
                    <p style="margin-top: 20px; color: var(--text-secondary); font-size: 0.85rem;">支持我开发更多有趣应用 ❤️</p>
                </div>
            </div>

            <main>
                <div class="search-area">
                    <div class="search-row-main">
                        <div class="search-input-wrap">
                            <select id="search-type-select" v-model="searchType" class="select-input" @change="persistSearchType">
                                <option value="song">歌手/歌曲</option>
                                <option value="album">专辑</option>
                            </select>
                            <input id="search-input" type="text" v-model.trim="query" :placeholder="searchPlaceholder" autocomplete="off" @input="persistQuery" @keyup.enter="performSearch()">
                        </div>
                        <button id="search-btn" :disabled="loading" @click="performSearch()">搜索</button>
                    </div>

                    <div class="search-row-options">
                        <div class="option-group">
                            <label class="option-label">音源</label>
                            <select ref="sourceSelect" v-model="source" class="select-input" @change="persistOption('source')">
                                {% if vip_mode %}
                                <option value="netease">网易云音乐 💎</option>
                                <option value="netease2">网易云音乐 2 💎</option>
                                <option value="tencent">QQ音乐 💎</option>
                                <option value="kuwo">酷我音乐 ⭐️</option>
                                <option value="tidal">Tidal 💎</option>
                                <option value="qobuz">Qobuz 💎</option>
                                <option value="joox">JOOX</option>
                                <option value="bilibili">B 站</option>
                                <option value="apple">Apple Music</option>
                                <option value="ytmusic">YouTube Music</option>
                                <option value="spotify">Spotify</option>
                                {% else %}
                                <option value="netease">网易云音乐 1 💎</option>
                                <option value="netease2">网易云音乐 2 💎</option>
                                <option value="kuwo">酷我音乐 ⭐️</option>
                                <option value="joox">JOOX</option>
                                <option value="bilibili">B 站</option>
                                {% endif %}
                            </select>
                        </div>

                        <div class="option-group">
                            <label class="option-label">音质</label>
                            <select ref="qualitySelect" v-model="quality" class="select-input" @change="persistOption('quality')">
                                {% if vip_mode %}
                                <option value="jymaster">超清母带 👑</option>
                                {% endif %}
                                <option value="999">无损 24bit 💎</option>
                                <option value="740">无损 16bit ⭐️</option>
                                <option value="320">高品质 320k</option>
                                <option value="192">较高 192k</option>
                                <option value="128">标准 128k</option>
                            </select>
                        </div>

                        <div class="option-group">
                            <label class="option-label">保存目录</label>
                            <select v-model="downloadSubdir" class="select-input" @change="persistOption('downloadSubdir')">
                                <option value="none">无</option>
                                <option value="artist">歌手</option>
                                <option value="album">专辑</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="loading" v-show="loading">
                    <div class="spinner"></div>
                    <p>正在搜索...</p>
                </div>

                <div id="results-container">
                    <div v-if="searched && !loading && results.length === 0" class="no-results">未找到结果。</div>

                    <template v-if="results.length > 0">
                        <div class="batch-toolbar">
                            <div class="batch-status">
                                <span class="selected-count">已选 [[ selectedCount ]] 首</span>
                                <label class="switch-option">
                                    <span class="switch-label">是否下载歌词</span>
                                    <input type="checkbox" v-model="batchDownloadLyric" @change="persistBatchDownloadLyric">
                                    <span class="switch-control" aria-hidden="true"></span>
                                </label>
                            </div>
                            <div class="batch-actions">
                                <button class="batch-btn" @click="selectAllResults">全选</button>
                                <button class="batch-btn" @click="clearSelection">清空</button>
                                <button class="batch-btn primary" :disabled="selectedCount === 0 || batchDownloading" @click="downloadSelectedTracks">下载选中</button>
                            </div>
                        </div>

                        <div v-for="track in results" :key="track.key" class="track-card"
                            :id="cardId(track)" :data-key="track.key"
                            :class="{ selected: isSelected(track), playing: isCurrentTrack(track), downloading: track.downloadState === 'downloading', failed: track.downloadState === 'failed' }"
                            :style="{ '--progress': track.previewProgress || 0 }"
                            @click="toggleTrackSelectionFromCard($event, track)">
                            <label class="track-select-wrap" title="选择歌曲" @click.stop>
                                <input type="checkbox" class="track-select" :checked="isSelected(track)" @change="toggleTrackSelection(track, $event.target.checked)">
                            </label>
                            <img :src="coverUrl(track)" class="cover-img" loading="lazy" @error="hideBrokenImage">
                            <div class="track-info">
                                <div class="track-name-row">
                                    <div class="track-name" :title="track.name">[[ track.name ]]</div>
                                    <div class="mobile-badges">
                                        <span v-if="track.info && track.info.level" class="badge-gold">[[ track.info.level ]]</span>
                                        <span v-if="track.info && track.info.size" class="badge-info">[[ track.info.size ]]</span>
                                    </div>
                                </div>
                                <div class="meta">
                                    <span class="clickable" @click.stop="searchKeyword(track.artist)">[[ track.artist ]]</span> ·
                                    <span v-if="track.album" class="clickable" @click.stop="searchAlbum(track.album)">[[ track.album ]]</span>
                                    <span v-else>Unknown</span>
                                </div>
                            </div>
                            <div class="download-wrapper">
                                <div class="pc-badges">
                                    <span v-if="track.info && track.info.level" class="badge-gold">[[ track.info.level ]]</span>
                                    <span v-if="track.info && track.info.size" class="badge-info">[[ track.info.size ]]</span>
                                </div>
                                <button class="icon-btn info-btn" title="查看音质与文件大小"
                                    :disabled="track.infoLoading" @click.stop="fetchTrackInfo(track)">
                                    <span v-if="track.infoLoading" v-html="iconSvg('loader', 16, 'spin-icon')"></span>
                                    <span v-else v-html="iconSvg('file-search-corner', 16)"></span>
                                </button>
                                <button class="icon-btn preview-btn" :class="{ playing: isCurrentTrack(track) && !audioPaused }"
                                    :disabled="track.previewLoading" title="试听" @click.stop="togglePreview(track)">
                                    <span v-if="isCurrentTrack(track) && !audioPaused" v-html="iconSvg('pause', 14, '', true)"></span>
                                    <span v-else v-html="iconSvg('play', 14, '', true)"></span>
                                </button>
                                <button class="icon-btn" title="仅下载歌词" :disabled="track.lyricState === 'downloading' || track.lyricState === 'done'" @click.stop="downloadLyricOnly(track)">
                                    <span v-if="track.lyricState === 'downloading'" v-html="iconSvg('loader', 16, 'spin-icon')"></span>
                                    <span v-else-if="track.lyricState === 'done'" v-html="iconSvg('check', 16)"></span>
                                    <span v-else v-html="iconSvg('mic-vocal', 16)"></span>
                                </button>
                                <button class="icon-btn download-btn"
                                    :class="{ done: track.downloadState === 'done', failed: track.downloadState === 'failed', 'is-loading': track.downloadState === 'downloading', 'progress-ring': track.downloadState === 'downloading' }"
                                    title="下载歌曲" :disabled="track.downloadState === 'downloading' || track.downloadState === 'done'" @click.stop="downloadTrack(track)">
                                    <svg v-if="track.downloadState === 'downloading'" class="progress-ring-svg" viewBox="0 0 36 36" :aria-label="downloadProgressLabel(track)">
                                        <circle class="progress-ring-value" cx="18" cy="18" r="16" :stroke-dasharray="progressDash(track)" stroke-dashoffset="0"></circle>
                                        <text class="progress-ring-text" x="18" y="18">[[ normalizedProgress(track) ]]</text>
                                    </svg>
                                    <span v-else-if="track.downloadState === 'done'" v-html="iconSvg('check', 16)"></span>
                                    <span v-else-if="track.downloadState === 'failed'" v-html="iconSvg('x', 16)"></span>
                                    <span v-else v-html="iconSvg('download', 20)"></span>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="pagination-container" v-show="showPagination">
                    <div class="pagination" style="margin: 0;">
                        <button class="page-btn" :disabled="currentPage <= 1" @click="changePage(-1)">上一页</button>
                        <button class="page-btn" :disabled="!hasNextPage" @click="changePage(1)">下一页</button>
                    </div>
                    <button id="back-to-top" title="返回顶部" @click="scrollToTop">
                        <span v-html="iconSvg('arrow-up', 20)"></span>
                    </button>
                </div>
            </main>

            <footer>
                <p style="margin-bottom: 0.5rem; opacity: 0.7;">免责声明：本站资源来自网络，仅限本人学习参考，严禁下载、传播或商用，如侵权请与我联系删除。继续使用将视为同意本声明。
                </p>
                <p>Made with ❤️ by <a href="https://juneix.github.io" target="_blank">谢週五</a> ｜ Powered by <a
                        href="https://music.gdstudio.org" target="_blank">GD音乐台</a> & <a href="https://api.bugpk.com"
                        target="_blank">BugPk-Api</a></p>
            </footer>
        </div>

        <div id="toast" :class="toastClass">[[ toastMessage ]]</div>
        <audio ref="audioEl"></audio>
    </div>

    <script src="/static/js/app.js"></script>

</body>

</html>
